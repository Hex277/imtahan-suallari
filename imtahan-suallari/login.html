<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daxil ol</title>
    <link rel="stylesheet" href="giris.css">
</head>
<body>
    <div class="giris-background">
        <div class="header-text-bg">
            <h1>Hesabınıza daxil olun</h1>
        </div>
        <div class="info-text-bg">
            <p>Mövcud hesabınıza giriş etmək üçün aşağıdakı boşluqları doldurun.</p>
        </div>
        <div class="input-bg">
            <p>E-poçt ünvanı:</p>
            <input type="email" class="email-input" placeholder="example@gmail.com">
            <p>Şifrə:</p>
            <input type="password" class="password-input" placeholder="********">
        </div>
        <div class="buttons-bg">
            <div class="donthaveac"><p>Hesabınız yoxdur? <a href="register.html">Yarat</a></p></div>
            <div class="daxilol-btn-bg">
                <button class="daxilol-btn">Daxil ol</button>
            </div>
        </div>
    </div>
</body>
</html>
