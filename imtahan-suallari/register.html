<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesab yarat</title>
    <link rel="stylesheet" href="giris.css">
</head>
<body>
    <div class="giris-background">
        <div class="header-text-bg">
            <h1>Yeni hesab yaradın</h1>
        </div>
        <div class="info-text-bg">
            <p>Qeydiyyatı tamamlamaq üçün e-poçt ünvanınıza təsdiqləmə kodu göndəriləcək.</p>
        </div>
        <div class="input-bg">
            <p>Adınız:</p>
            <input type="text" class="ad-input" placeholder="ad">
            <p>E-poçt ünvanı:</p>
            <input type="email" class="email-input" placeholder="example@gmail.com">
            <p>Şifrə:</p>
            <input type="password" class="password-input" placeholder="********">
        </div>
        <div class="buttons-bg">
            <div class="haveac"><p>Artıq hesabınız var? <a href="login.html">Daxil ol</a></p></div>
            <div class="yarat-btn-bg">
                <button class="yarat-btn">Yarat</button>
            </div>
        </div>
    </div>
</body>
</html>
