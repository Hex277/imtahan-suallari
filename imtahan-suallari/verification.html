<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Təsdiqləmə | ixtisastap.com</title>
    <link rel="stylesheet" href="giris.css">
</head>
<body>
    <div class="giris-background">
        <div class="header-text-bg">
            <h1>E-poçt ünvanınızı təsdiqləyin</h1>
        </div>
        <div class="info-text-bg">
            <p>E-poçt ünvanınıza göndərilən 6 rəqəmli təsdiq kodunu daxil edin.</p>
        </div>
        <div class="input-bg">
            <p>E-poçt ünvanınız:</p>
            <input type="email" class="email-input" placeholder="example@gmail.com" readonly>
            <p>Təsdiq kodu:</p>
            <div class="tesdiq-kodu">
              <input
                type="text"
                class="tesdiq-input"
                id="tesdiq"
                maxlength="6"
                inputmode="numeric"
              >

              <div class="code-boxes" id="code-boxes">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
              </div>
            </div>
        </div>
        <div class="buttons-bg">
            <div class="haveac"><p>E-poçt addressi yanlışdır? <a href="register.html">Dəyiş</a></p></div>
            <div class="yarat-btn-bg">
                <button class="tesdiq-btn">Təsdiqlə</button>
            </div>
        </div>
    </div>
    <script src="giris.js"></script>
</body>
</html>
